services:
  go-app:
    container_name: myapp_go
    image: myapp/go-app:1.0.0
    build: .
    volumes:
      - ./.env:/app/.env
    environment:
      DATABASE_URL: "host=${DB_HOST} user=${DB_USER} password=${DB_PASSWORD} dbname=${DB_NAME} sslmode=disable"
      DB_PORT: "5432"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_USE_SSL: "false"
      MINIO_BUCKET: "product-media"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      - go_db
      - minio
    restart: unless-stopped

  go_db:
    container_name: myapp_postgres
    image: postgres:18
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_DB:       ${DB_NAME}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    restart: unless-stopped

  pgadmin:
    container_name: myapp_pgadmin
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL:                 ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD:              ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE:            'False'
      PGADMIN_CONFIG_WTF_CSRF_ENABLED:       'False'
      PGADMIN_CONFIG_WTF_CSRF_CHECK_DEFAULT: 'False'
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION_ENABLED: 'False'
    ports:
      - "5050:80"
    depends_on:
      - go_db
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    restart: unless-stopped

  minio:
    container_name: myapp_minio
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped

volumes:
  pgdata:       {}
  pgadmin-data: {}
  minio-data:   {}